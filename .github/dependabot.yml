version: 2
updates:
  # ---------- npm 依赖 ----------
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    # 只允许 minor / patch；major 升级容易引入破坏性变更，统一改为人工评估
    ignore:
      # React 19 有破坏性变更，且会影响所有 React 生态 peer，必须人工迁移
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/react'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/react-dom'
        update-types: ['version-update:semver-major']
      # React Router 7 是大版本变更
      - dependency-name: 'react-router-dom'
        update-types: ['version-update:semver-major']
      # i18next 大版本经常重命名 API
      - dependency-name: 'i18next'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-i18next'
        update-types: ['version-update:semver-major']
      # Tailwind 4 是大重写
      - dependency-name: 'tailwindcss'
        update-types: ['version-update:semver-major']

    groups:
      # React 生态：必须一起升，避免 peer 冲突
      react-ecosystem:
        applies-to: version-updates
        update-types: ['minor', 'patch']
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
          - 'lucide-react'
          - 'framer-motion'
          - 'react-i18next'
          - 'react-markdown'
          - 'react-router-dom'
          - 'react-type-animation'
          - '@giscus/react'
      # 构建工具链
      build-tools:
        applies-to: version-updates
        update-types: ['minor', 'patch']
        patterns:
          - 'vite'
          - 'vite-*'
          - '@vitejs/*'
          - 'typescript'
          - 'typescript-*'
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'postcss'
          - 'autoprefixer'
      # Markdown / 渲染
      markdown:
        applies-to: version-updates
        update-types: ['minor', 'patch']
        patterns:
          - 'remark-*'
          - 'rehype-*'
          - 'gray-matter'
          - 'mermaid'
          - 'katex'

  # ---------- GitHub Actions ----------
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    groups:
      gh-actions:
        patterns:
          - '*'
