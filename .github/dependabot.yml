version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      react:
        patterns:
          - 'react*'
          - '@types/react*'
      build-tools:
        patterns:
          - 'vite*'
          - '@vitejs/*'
          - 'typescript*'
          - 'eslint*'
          - '@eslint/*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
